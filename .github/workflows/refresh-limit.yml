name: Refresh Claude Quota Limit

on:
  schedule:
    # 严格按照“5小时01分钟”间隔定制的北京时间全天候刷新策略：
    # 四个刷新时刻依次严格相隔 5 小时 01 分钟，确保白天工作及日常使用时段的额度最大化。
    # 删除了凌晨的第五刷（本为 02:08 刷新），以防延迟执行影响 05:00 第一刷的重置窗口。
    
    # 1. 第一刷：北京时间 05:00 刷新 (对应 UTC 前一天 21:00)
    - cron: '0 21 * * *'
    
    # 2. 第二刷：北京时间 10:01 刷新 (对应 UTC 当天 02:01)
    - cron: '1 2 * * *'
    
    # 3. 第三刷：北京时间 15:02 刷新 (对应 UTC 当天 07:02)
    - cron: '2 7 * * *'
    
    # 4. 第四刷：北京时间 20:03 刷新 (对应 UTC 当天 12:03)
    - cron: '3 12 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  refresh-limit:
    name: "Refresh Z.ai/Bigmodel Claude Limit"
    runs-on: ubuntu-latest

    steps:
      - name: "Send Refresh Request to Z.ai & Zhipu"
        env:
          # GitHub Secrets 中的秘钥，优先读取 ZHIPU_API_KEY
          AUTH_TOKEN: "${{ secrets.ZHIPU_API_KEY || secrets.ZHIPU_TOKEN || secrets.ANTHROPIC_AUTH_TOKEN }}"
        run: |
          if [ -z "${AUTH_TOKEN}" ]; then
            echo "❌ Error: AUTH_TOKEN is empty. Please configure ZHIPU_API_KEY in GitHub Secrets."
            exit 1
          fi

          echo "=============================================="
          echo "⏰ 开始模拟提问以激活 5 小时滚动时间窗口..."
          echo "=============================================="

          # 通过发送超低消耗的真实模型对话，强行在智谱后台生成调用时间戳，从而激活 5 小时冷却倒计时
          # 这样能确保在 5 小时后（11点、16点、21点）自动释放额度窗口，实现工作时段额度最大化！
          
          # 仅请求国内大模型官网，且只调用与 Claude Code 完全对齐的 messages 接口
          # 这样每次定时任务仅产生 1 次调用消耗（只扣除 1 次提问数，且仅消耗 6-7 个 token），确保次数与额度损耗最小化
          DOMAIN="https://open.bigmodel.cn"
          
          echo "----------------------------------------------"
          echo "正在向平台发送模拟提问: $DOMAIN ..."
          
          # 模拟 Claude API 接口提问 (兼容 Claude Code 协议)
          # 添加了 --connect-timeout 10 -m 30 防止 GitHub Runner 在网络连接异常时无限期挂起
          echo "👉 POST $DOMAIN/api/anthropic/v1/messages"
          curl -s --connect-timeout 10 -m 30 -X POST \
            -H "x-api-key: ${AUTH_TOKEN}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model": "glm-4.7", "messages": [{"role": "user", "content": "ping"}], "max_tokens": 1}' \
            "$DOMAIN/api/anthropic/v1/messages"
          echo ""
          
          echo "=============================================="
          echo "✅ 模拟提问请求发送完成，已成功触发 5 小时限额窗口起点。"
          echo "=============================================="
